<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寫模卷前要先背會的單字</title>
<style>
    /* --- 配色與極致圓潤設定 --- */
    :root {
        --kitty-beige: #F5F2ED;      /* 米白色背景 */
        --kitty-text: #6B6865;       /* 深灰褐字體 */
        --kitty-border: #D1CDCA;     /* 邊框色 */
        --pure-white: #FFFFFF;
        
        /* 您指定的色號 #FF88C2：用於副標題的愛心 */
        --heart-pink: #FF88C2; 
        /* 頁尾愛心維持 R35-4 溫柔粉 */
        --encouragement-pink: #C78B9F; 

        /* 單元專屬莫蘭迪色 */
        --color-unit-1: #967AA1; /* 霧紫色 */
        --color-unit-2: #94A6B3; /* 霧藍色 */
        --color-unit-3: #A9B29B; /* 鼠尾草綠 */
        --color-unit-4: #C2A994; /* 暖木棕 */
    }

    body {
        font-family: "Quicksand", "Nunito", "Varela Round", "Microsoft JhengHei", sans-serif;
        background-color: var(--kitty-beige);
        color: var(--kitty-text);
        margin: 0; padding: 10px; 
        display: flex; justify-content: center;
        line-height: 1.6;
    }

    .main-container {
        width: 100%; max-width: 850px;
        background-color: var(--pure-white);
        border-radius: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        overflow: hidden;
        border: 1px solid var(--kitty-border);
        display: flex;
        flex-direction: column;
    }

    header {
        padding: 40px 20px 15px; /* 穩定的頂部空間，縮小與內容間距 */
        text-align: center;
    }

    header h1 { 
        margin: 0; font-size: 2.1rem; 
        color: var(--color-unit-1); 
        font-weight: 700;
        letter-spacing: 1px;
    }

    .sub-title { 
        margin: 12px 0 0; 
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 1.7rem; 
        color: var(--encouragement-pink);
        font-weight: 700;
        letter-spacing: 2px;
    }

    .svg-heart-pink {
        width: 26px;
        height: 26px;
        fill: var(--heart-pink);
    }

    .content { padding: 0 40px 30px; } 

    .group-container { margin-bottom: 25px; } /* 縮小單元間距 */

    .group-title {
        font-size: 1.4rem;
        margin-bottom: 10px; /* 標題與按鈕更靠近 */
        font-weight: 700;
        display: flex; align-items: center; gap: 12px;
    }

    .group-title::before {
        content: ""; width: 8px; height: 26px; border-radius: 10px;
    }

    /* --- 讓 Icon 變窄、緊密靠左排版 --- */
    .file-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px; /* 按鈕之間的固定緊密間距 */
    }

    .file-item {
        width: 55px;  /* 固定寬度，符合 1,2,3,4,5 的大小 */
        height: 55px; /* 固定高度，讓它呈現精緻的圓方塊 */
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--pure-white); 
        font-size: 1.6rem; 
        font-weight: 700;
        border-radius: 18px;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        flex-shrink: 0;
    }

    .file-item:hover {
        transform: scale(1.1);
        filter: brightness(1.08);
        z-index: 2;
    }

    /* 單元分色 */
    .group-purple .group-title { color: var(--color-unit-1); }
    .group-purple .group-title::before { background-color: var(--color-unit-1); }
    .group-purple .file-item { background-color: var(--color-unit-1); }

    .group-blue .group-title { color: var(--color-unit-2); }
    .group-blue .group-title::before { background-color: var(--color-unit-2); }
    .group-blue .file-item { background-color: var(--color-unit-2); }

    .group-green .group-title { color: var(--color-unit-3); }
    .group-green .group-title::before { background-color: var(--color-unit-3); }
    .group-green .file-item { background-color: var(--color-unit-3); }

    .group-brown .group-title { color: var(--color-unit-4); }
    .group-brown .group-title::before { background-color: var(--color-unit-4); }
    .group-brown .file-item { background-color: var(--color-unit-4); }

    /* 頁尾與溫柔粉愛心 */
    footer { 
        text-align: center; padding: 40px 20px; 
        font-size: 1.5rem; 
        color: var(--kitty-text);
        font-weight: 700;
        font-family: "Varela Round", sans-serif;
        border-top: 1px solid var(--kitty-beige);
        display: flex; align-items: center; justify-content: center; gap: 12px;
    }

    .svg-heart-footer { width: 28px; height: 28px; fill: var(--encouragement-pink); }

    @media (max-width: 600px) {
        .content { padding: 0 20px 25px; }
        header h1 { font-size: 1.6rem; }
        .sub-title { font-size: 1.3rem; gap: 5px; }
        .file-item { width: 50px; height: 50px; font-size: 1.4rem; border-radius: 15px; }
        footer { font-size: 1.2rem; gap: 8px; padding: 30px 10px;}
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=Varela+Round&display=swap" rel="stylesheet">
