<!DOCTYPE html>

<meta charset="UTF-8">

<title>寫模擬卷之前要先背會的單字</title>
<style>
    /* --- 高雅莫蘭迪色彩定義 --- */
    :root {
        --kitty-beige: #F5F2ED;      /* 米白色背景 */
        --kitty-text: #6B6865;       /* 深灰褐字體 */
        --kitty-border: #D1CDCA;     /* 邊框色 */
        --pure-white: #FFFFFF;
        --encouragement-pink: #C78B9F; /* 副標題與愛心 R35-4 */

        /* 單元專屬色 (莫蘭迪色系) */
        --color-unit-1: #967AA1; /* 灰紫色 */
        --color-unit-2: #94A6B3; /* 霧藍色 */
        --color-unit-3: #A9B29B; /* 鼠尾草綠 */
        --color-unit-4: #C2A994; /* 暖木棕 */
    }

    body {
        font-family: "Quicksand", "Nunito", "Varela Round", "Microsoft JhengHei", sans-serif;
        background-color: var(--kitty-beige);
        color: var(--kitty-text);
        margin: 0; padding: 20px;
        display: flex; justify-content: center;
        line-height: 1.6;
    }

    .main-container {
        width: 100%; max-width: 850px;
        background-color: var(--pure-white);
        border-radius: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        overflow: hidden;
        border: 1px solid var(--kitty-border);
    }

    header {
        padding: 60px 20px 45px;
        text-align: center;
    }

    header h1 { 
        margin: 0; font-size: 2.3rem; 
        color: var(--color-unit-1); /* 預設使用優雅紫 */
        font-weight: 700;
        letter-spacing: 1px;
    }

    header p { 
        margin: 20px 0 0; font-size: 1.9rem; 
        color: var(--encouragement-pink);
        font-weight: 700;
        letter-spacing: 2px;
    }

    .content { padding: 10px 40px 40px; }

    .group-container { margin-bottom: 50px; }

    .group-title {
        font-size: 1.6rem;
        margin-bottom: 20px;
        font-weight: 700;
        display: flex; align-items: center; gap: 15px;
    }

    .group-title::before {
        content: ""; width: 12px; height: 32px; border-radius: 10px;
    }

    .file-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
    }

    .file-item {
        padding: 22px 10px;
        text-decoration: none;
        color: var(--pure-white); /* 字體改為白色，在高雅色塊上更清晰 */
        font-size: 1.6rem; 
        font-weight: 700;
        text-align: center;
        border-radius: 30px;
        transition: all 0.2s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .file-item:hover {
        transform: scale(1.08);
        filter: brightness(1.1); /* 懸停時稍微變亮 */
    }

    /* --- 單元分色邏輯 --- */

    /* 第一排：灰紫色系 */
    .group-purple .group-title { color: var(--color-unit-1); }
    .group-purple .group-title::before { background-color: var(--color-unit-1); }
    .group-purple .file-item { background-color: var(--color-unit-1); }

    /* 第二排：霧藍色系 */
    .group-blue .group-title { color: var(--color-unit-2); }
    .group-blue .group-title::before { background-color: var(--color-unit-2); }
    .group-blue .file-item { background-color: var(--color-unit-2); }

    /* 第三排：鼠尾草綠系 */
    .group-green .group-title { color: var(--color-unit-3); }
    .group-green .group-title::before { background-color: var(--color-unit-3); }
    .group-green .file-item { background-color: var(--color-unit-3); }

    /* 第四排：暖木棕色系 */
    .group-brown .group-title { color: var(--color-unit-4); }
    .group-brown .group-title::before { background-color: var(--color-unit-4); }
    .group-brown .file-item { background-color: var(--color-unit-4); }

    /* 頁尾 */
    footer { 
        text-align: center; padding: 55px 20px; 
        font-size: 1.7rem; 
        color: var(--kitty-text);
        font-weight: 700;
        border-top: 1px solid var(--kitty-beige);
        display: flex; align-items: center; justify-content: center; gap: 15px;
    }

    .svg-heart { width: 32px; height: 32px; fill: var(--encouragement-pink); }

    @media (max-width: 600px) {
        header h1 { font-size: 1.7rem; }
        header p { font-size: 1.4rem; }
        .content { padding: 10px 20px 30px; }
        .file-list { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
        .file-item { font-size: 1.4rem; padding: 18px 5px; }
        footer { font-size: 1.3rem; }
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=Varela+Round&display=swap" rel="stylesheet">
