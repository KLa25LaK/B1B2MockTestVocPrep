<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字挑戰練習 11402-1-1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .progress-bar-transition { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-button:active:not(:disabled) { transform: scale(0.98); }
        .stats-card { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        
        /* 答對樣式：淡綠色底、亮綠色框、深綠色字體 */
        .btn-correct { 
            background-color: #ecfdf5 !important; 
            border-color: #10b981 !important; 
            color: #065f46 !important; 
        }
        /* 答錯樣式：淡粉紅色底、桃紅色框、桃紅色字體 */
        .btn-wrong { 
            background-color: #fdf2f8 !important; 
            border-color: #f472b6 !important; 
            color: #db2777 !important; 
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- 10px 淡粉紅色大外框 -->
    <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden fade-in border-[10px] border-pink-400">
        <!-- 頂部統計區 -->
        <div id="history-panel" class="px-6 py-4 stats-card border-b border-gray-200">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4 text-xs font-bold text-gray-500 uppercase tracking-widest">
                    <span>個人練習: <span id="total-attempts" class="text-indigo-600 font-mono text-sm">0</span> 次</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="px-2 py-1 text-pink-400 rounded text-[10px] font-bold">總練習人次</span>
                    <span id="global-plays" class="text-lg font-mono font-bold text-pink-400">--</span>
                </div>
            </div>
        </div>

        <!-- 頂部進度條區域 -->
        <div id="progress-area" class="p-6 bg-white border-b border-gray-100 hidden">
            <div class="flex items-center gap-4">
                <div class="flex-grow h-3 bg-purple-100 rounded-full overflow-hidden shadow-inner">
                    <div id="progress-bar" class="progress-bar-transition h-full bg-purple-400 w-0"></div>
                </div>
                <div class="text-lg font-mono font-bold text-gray-700 whitespace-nowrap">
                    <span id="current-count">0</span> / <span id="total-count">25</span>
                </div>
            </div>
            
            <div class="flex justify-between items-center mt-3 px-1">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    <span class="text-sm font-bold text-emerald-600">答對: <span id="stat-correct">0</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span>
                    <span class="text-sm font-bold text-red-500">答錯: <span id="stat-wrong">0</span></span>
                </div>
            </div>
        </div>

        <!-- 主練習區域 -->
        <div id="main-container" class="p-8 min-h-[420px] flex flex-col justify-center">
            
            <!-- 初始開始畫面 - 使用 space-y-8 統一所有元件之間的間距 -->
            <div id="start-screen" class="text-center py-10 flex flex-col items-center space-y-8">
                
                <!-- 標題部分：粉紫色 -->
                <h2 class="text-4xl font-black text-purple-400 drop-shadow-sm">單字大挑戰</h2>
                
                <!-- 編號部分：淡灰色 -->
                <p class="text-2xl font-bold text-gray-400">11402-1-1</p>
                
                <!-- 五個淡粉紅色愛心 -->
                <div class="flex justify-center gap-2 text-pink-300">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>

                <!-- 開始挑戰按鈕 -->
                <button id="btn-start-new" class="w-full bg-purple-400 hover:bg-purple-500 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg shadow-purple-200 text-xl text-center font-black">
                    開始挑戰
                </button>
            </div>

            <!-- 題目區域 -->
            <div id="question-area" class="hidden text-center">
                <p id="mode-hint" class="text-sm text-purple-400 font-bold mb-2 tracking-widest uppercase"></p>
                <h2 id="question-text" class="text-4xl font-bold text-gray-800 mb-8 text-center leading-tight">載入中...</h2>
                
                <div id="options-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                    <!-- 選項按鈕會動態插入 -->
                </div>

                <!-- 下一題按鈕：粉紫色 -->
                <button id="btn-next-question" class="hidden w-full bg-purple-400 hover:bg-purple-500 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg shadow-purple-200 flex items-center justify-center gap-2 text-lg">
                    <span>下一題</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>

            <!-- 結束結算畫面 -->
            <div id="result-area" class="hidden text-center py-10">
                <div id="result-emoji" class="text-6xl mb-6 text-center">🎉</div>
                <h3 class="text-3xl font-bold text-gray-800 mb-2">測驗結束！</h3>
                <p id="result-stats" class="text-gray-600 mb-8 text-xl whitespace-pre-line text-center"></p>
                
                <div class="space-y-3">
                    <button id="btn-review" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg shadow-emerald-200 text-lg">
                        針對錯字複習
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部導覽列 -->
        <div class="px-4 py-4 bg-gray-50 flex gap-2 border-t border-gray-100">
            <button id="btn-back-prev" class="flex-1 bg-sky-400 hover:bg-sky-500 text-white font-bold py-3 px-2 rounded-xl transition shadow flex items-center justify-center gap-1 text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                回到上一頁
            </button>
            <button id="btn-restart" class="flex-1 bg-amber-300 hover:bg-amber-400 text-white font-bold py-3 px-2 rounded-xl transition shadow flex items-center justify-center gap-1 text-sm text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                重新開始遊戲
            </button>
            <button id="btn-go-home" class="flex-1 bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 px-2 rounded-xl transition shadow flex items-center justify-center gap-1 text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                回到主頁
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const CONFIG = {
            title: "單字大挑戰 11402-1-1",
            unitId: "11402_1_1", 
            words: [
                {en: "achievement", ch: "成就；達成"}, {en: "additional", ch: "額外的"}, {en: "affection", ch: "喜愛；感情"},
                {en: "align", ch: "排成直線；結盟"}, {en: "alternative", ch: "選擇；替代的"}, {en: "analyze", ch: "分析"},
                {en: "apology", ch: "道歉"}, {en: "assign", ch: "指派；分配"}, {en: "associate", ch: "聯想；交往"},
                {en: "assumption", ch: "假設"}, {en: "attain", ch: "達成；獲得"}, {en: "attentive", ch: "專注的；體貼的"},
                {en: "available", ch: "可得到的；有空的"}, {en: "benefit", ch: "利益；有益於"}, {en: "biological", ch: "生物的"},
                {en: "bless", ch: "保佑；祝福"}, {en: "capacity", ch: "容量；能力"}, {en: "celebrity", ch: "名人"},
                {en: "ceremony", ch: "典禮；儀式"}, {en: "challenge", ch: "挑戰"}, {en: "champion", ch: "冠軍"},
                {en: "circulation", ch: "循環；發行量"}, {en: "clue", ch: "線索"}, {en: "comfort", ch: "安慰；舒適"},
                {en: "congratulate", ch: "恭喜"}
            ] 
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vocab-quiz-1-1';
        
        let db, auth;
        let quizPool = [];
        let currentIndex = 0;
        let wrongWords = [];
        let currentWord = {};
        let isReviewMode = false;
        let correctCount = 0;
        let wrongCount = 0;
        let userStats = { totalAttempts: 0 };
        let currentUser = null;

        const checkIcon = `<svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="3"></circle></svg>`;
        const crossIcon = `<svg class="w-6 h-6 text-pink-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;

        function switchScreen(screenId) {
            const screens = ['start-screen', 'question-area', 'result-area'];
            screens.forEach(s => {
                const el = document.getElementById(s);
                if (el) el.classList.add('hidden');
            });
            const target = document.getElementById(screenId);
            if (target) target.classList.remove('hidden');
            document.getElementById('progress-area').classList.toggle('hidden', screenId !== 'question-area');
        }

        const initApp = async () => {
            try {
                if (typeof __firebase_config === 'undefined' || !__firebase_config) return;
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stats', CONFIG.unitId);
                        onSnapshot(statsRef, (docSnap) => {
                            if (docSnap.exists()) {
                                userStats = docSnap.data();
                                document.getElementById('total-attempts').innerText = userStats.totalAttempts || 0;
                            }
                        });
                        const globalRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_counters', CONFIG.unitId);
                        onSnapshot(globalRef, (docSnap) => {
                            document.getElementById('global-plays').innerText = docSnap.exists() ? docSnap.data().totalPlays : 0;
                        });
                    }
                });
            } catch (error) { console.warn("Firebase 初始化失敗"); }
        };

        const recordCompletion = async () => {
            if (!currentUser || !db) return;
            try {
                const globalRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_counters', CONFIG.unitId);
                await setDoc(globalRef, { totalPlays: increment(1) }, { merge: true });
                const statsRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'stats', CONFIG.unitId);
                await setDoc(statsRef, { totalAttempts: increment(1), lastCompleted: new Date().toISOString() }, { merge: true });
            } catch (e) { console.error("更新統計失敗", e); }
        };

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function initQuiz(isReview) {
            isReviewMode = isReview;
            quizPool = isReview ? [...wrongWords] : [...CONFIG.words];
            shuffle(quizPool);
            if (!isReview) wrongWords = [];
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            updateStatsUI();
            
            const totalCountEl = document.getElementById('total-count');
            if (totalCountEl) totalCountEl.innerText = quizPool.length;
            
            document.getElementById('progress-bar').style.width = '0%';
            switchScreen('question-area');
            showQuestion();
        }

        function updateStatsUI() {
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;
        }

        function showQuestion() {
            if (currentIndex >= quizPool.length) { showResult(); return; }
            const progress = ((currentIndex) / quizPool.length) * 100;
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) progressBar.style.width = `${progress}%`;
            
            const currentCountEl = document.getElementById('current-count');
            if (currentCountEl) currentCountEl.innerText = currentIndex + 1;
            
            const nextBtn = document.getElementById('btn-next-question');
            if (nextBtn) nextBtn.classList.add('hidden');
            
            const wordData = quizPool[currentIndex];
            const isEnToCh = Math.random() > 0.5;
            currentWord = { q: isEnToCh ? wordData.en : wordData.ch, a: isEnToCh ? wordData.ch : wordData.en, original: wordData };
            
            const modeHint = document.getElementById('mode-hint');
            if (modeHint) modeHint.innerText = isEnToCh ? "英選中" : "中選英";
            const questionText = document.getElementById('question-text');
            if (questionText) questionText.innerText = currentWord.q;
            
            let options = [currentWord.a];
            while (options.length < Math.min(4, CONFIG.words.length)) {
                const randomWord = CONFIG.words[Math.floor(Math.random() * CONFIG.words.length)];
                const randomVal = isEnToCh ? randomWord.ch : randomWord.en;
                if (!options.includes(randomVal)) options.push(randomVal);
            }
            shuffle(options);
            
            const grid = document.getElementById('options-grid');
            if (grid) {
                grid.innerHTML = '';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-button bg-white border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 p-4 rounded-xl text-lg text-gray-700 transition-all font-medium text-center leading-snug";
                    btn.innerText = opt;
                    btn.onclick = () => checkAnswer(opt, btn);
                    grid.appendChild(btn);
                });
            }
        }

        function checkAnswer(selected, selectedBtn) {
            const buttons = document.querySelectorAll('.option-button');
            buttons.forEach(btn => btn.disabled = true);
            if (selected === currentWord.a) {
                correctCount++;
                selectedBtn.classList.add('btn-correct');
                selectedBtn.innerHTML = `<div class="flex items-center justify-center gap-2"><span>${selected}</span> ${checkIcon}</div>`;
            } else {
                wrongCount++;
                selectedBtn.classList.add('btn-wrong');
                selectedBtn.innerHTML = `<div class="flex items-center justify-center gap-2"><span>${selected}</span> ${crossIcon}</div>`;
                buttons.forEach(btn => {
                    if (btn.innerText === currentWord.a) {
                        btn.classList.add('btn-correct');
                        btn.innerHTML = `<div class="flex items-center justify-center gap-2"><span>${currentWord.a}</span> ${checkIcon}</div>`;
                    }
                });
                if (!wrongWords.some(w => w.en === currentWord.original.en)) { wrongWords.push(currentWord.original); }
            }
            updateStatsUI();
            const progress = ((currentIndex + 1) / quizPool.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            const nextBtn = document.getElementById('btn-next-question');
            if (nextBtn) nextBtn.classList.remove('hidden');
        }

        function showResult() {
            switchScreen('result-area');
            const resultStats = document.getElementById('result-stats');
            if (resultStats) resultStats.innerText = `本局表現：答對 ${correctCount} / ${quizPool.length}\n錯字：${wrongWords.length} 個`;
            if (!isReviewMode) { recordCompletion(); }
            const reviewBtn = document.getElementById('btn-review');
            if (reviewBtn) reviewBtn.classList.toggle('hidden', wrongWords.length === 0);
        }

        document.getElementById('btn-start-new').addEventListener('click', () => initQuiz(false));
        document.getElementById('btn-review').addEventListener('click', () => initQuiz(true));
        document.getElementById('btn-next-question').addEventListener('click', () => { currentIndex++; showQuestion(); });
        
        document.getElementById('btn-restart').addEventListener('click', () => { 
            if (confirm("確定要重新開始遊戲嗎？這將重置所有當前進度。")) { 
                initQuiz(false); 
            } 
        });
        
        document.getElementById('btn-go-home').addEventListener('click', () => switchScreen('start-screen'));
        document.getElementById('btn-back-prev').addEventListener('click', () => { 
            if (window.history.length > 1) { 
                window.history.back(); 
            } else { 
                switchScreen('start-screen'); 
            } 
        });
        
        initApp();
    </script>
</body>
</html>
