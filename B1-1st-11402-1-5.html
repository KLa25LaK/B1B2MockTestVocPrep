<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模卷單字預習＋複習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Quicksand:wght@500;700&display=swap');
        
        :root {
            --primary-pink: #F06292;
            --primary-purple: #B39DDB;
            --soft-yellow: #FFF176;
            --pastel-green: #A5D6A7;
        }

        body { font-family: 'Quicksand', 'Noto Sans TC', sans-serif; background-color: #E0E0E0; }

        .outer-card {
            width: 100%;
            max-width: 500px;
            height: auto; 
            background: white;
            border-radius: 2.5rem;
            border: 10px solid var(--primary-pink);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            position: relative;
        }

        .content-area { padding: 10px 15px 0 15px; }

        .btn-base {
            border-radius: 1.25rem;
            font-weight: 800;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .btn-base:active { transform: translateY(1px); }

        .opt-btn { 
            background: white; 
            border: 3px solid #F1F5F9; 
            color: #64748B; 
            min-height: 72px; 
            height: auto;
            width: 100%; 
            padding: 8px 35px 8px 12px;
            line-height: 1.2;
            text-align: center;
        }
        
        .opt-text {
            display: block;
            width: 100%;
            word-break: break-all;
            overflow: hidden;
            /* 針對超長單字的自適應字級 */
            font-size: clamp(0.85rem, 3.8vw, 1.35rem); 
        }
        
        .feedback-icon {
            position: absolute;
            right: 6px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
        }

        .footer-nav { display: flex; gap: 0; padding: 0; margin-top: 10px; }
        .footer-nav .btn-base { border-radius: 0; flex: 1; height: 75px; font-size: 1.4rem; }
        .nav-yellow { background: var(--soft-yellow); color: #827717; }
        .nav-pink { background: var(--primary-pink); color: white; }

        .progress-bar-fill { transition: width 0.4s ease; background: var(--primary-purple); }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 2rem; width: 80%; max-width: 350px;
            text-align: center; border: 4px solid var(--soft-yellow); box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .custom-heart {
            width: 28px; height: 28px; background-color: var(--primary-pink);
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; -webkit-mask-size: contain; mask-size: contain;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="outer-card">
        <div id="confirm-modal" class="overlay">
            <div class="modal-content">
                <h3 id="modal-title" class="text-xl font-black text-slate-700 mb-1">確定嗎？</h3>
                <p id="modal-desc" class="text-slate-400 text-sm mb-4"></p>
                <div class="flex gap-4">
                    <button id="modal-no" class="btn-base bg-slate-100 text-slate-500 flex-1 py-3">取消</button>
                    <button id="modal-yes" class="btn-base bg-yellow-400 text-white flex-1 py-3">確定</button>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div id="game-info" class="hidden mb-1">
                <div class="w-full h-4 bg-slate-100 rounded-full overflow-hidden mb-1">
                    <div id="progress-bar" class="progress-bar-fill h-full w-0"></div>
                </div>
                <div class="flex justify-between items-center text-[9px] font-black text-slate-400 uppercase leading-none">
                    <span class="text-green-500">CORRECT: <span id="live-correct">0</span></span>
                    <span><span id="current-idx">0</span> / <span id="total-idx">21</span></span>
                    <span class="text-pink-500">WRONG: <span id="live-wrong">0</span></span>
                </div>
                <div class="text-right mt-1">
                    <span class="text-slate-400 font-black" style="font-size: 10px;">B1-1st-11402-1-5</span>
                </div>
            </div>

            <div id="screen-start" class="flex flex-col items-center py-6">
                <h1 class="text-4xl font-black text-slate-600 mb-2">模卷單字預習＋複習</h1>
                <p class="text-3xl font-black text-slate-400 mb-4">B1-1st-11402-1-5</p>
                <div class="flex gap-2.5 mb-8">
                    <div class="custom-heart"></div><div class="custom-heart"></div><div class="custom-heart"></div><div class="custom-heart"></div><div class="custom-heart"></div>
                </div>
                <button id="btn-play" class="btn-base bg-[--primary-purple] text-white h-[75px] w-full text-2xl shadow-lg" style="border-radius: 2rem;">開始測驗</button>
            </div>

            <div id="screen-quiz" class="hidden flex-col items-center">
                <p id="quiz-mode" class="text-[9px] font-black text-slate-300 tracking-widest uppercase mb-1 mt-1"></p>
                <h2 id="quiz-question" class="text-4xl font-black text-slate-700 leading-none mb-4 text-center"></h2>
                <div id="options-grid" class="grid grid-cols-2 gap-1.5 w-full"></div>
                <button id="btn-next" class="invisible mt-3 btn-base bg-[--primary-purple] text-white w-full" style="height: 52px; font-size: 1.4rem; border-radius: 1.25rem;">下一題 ➔</button>
            </div>

            <div id="screen-result" class="hidden flex-col items-center text-center py-6">
                <div class="text-6xl mb-2">✨</div>
                <h2 class="text-2xl font-black text-slate-700 mb-1">測驗完成！</h2>
                <p id="result-score" class="text-slate-400 font-bold mb-4"></p>
                <button id="btn-review-wrong" class="hidden btn-base w-full py-4 text-white font-black text-xl mb-2" style="background-color: var(--pastel-green);">針對錯題複習</button>
                <button id="btn-play-again" class="btn-base bg-[--primary-purple] text-white w-full py-4 text-xl">全部重新開始</button>
            </div>
        </div>

        <div id="footer" class="footer-nav">
            <button id="nav-restart" class="btn-base nav-yellow hidden">重新開始遊戲</button>
            <button id="nav-home" class="btn-base nav-pink">回到主頁</button>
        </div>
    </div>

    <script type="module">
        const WORDS = [
            {en: "Fragility", ch: "(n.) 脆弱"}, {en: "Native", ch: "(adj.) 本土的；原生的"}, {en: "Overcome", ch: "(v.) 克服"},
            {en: "Reconstruct", ch: "(v.) 重建"}, {en: "Reinforce", ch: "(v.) 強化"}, {en: "Transmit", ch: "(v.) 傳送；傳播"},
            {en: "Highlight", ch: "(v.) 強調；凸顯"}, {en: "Frustration", ch: "(n.) 挫折"}, {en: "Sympathetic", ch: "(adj.) 同情的"},
            {en: "Conservative", ch: "(adj.) 保守的"}, {en: "Original", ch: "(adj.) 原創的；原始的"}, {en: "Global", ch: "(adj.) 全球的"},
            {en: "Psychological", ch: "(adj.) 心理的"}, {en: "Mutual", ch: "(adj.) 相互的"}, {en: "Harmonious", ch: "(adj.) 和諧的"},
            {en: "Intellectual", ch: "(adj.) 智力的"}, {en: "Consequently", ch: "(adv.) 因此"}, {en: "Contribute", ch: "(v.) 貢獻；有助於"},
            {en: "Devote", ch: "(v.) 奉獻；致力於"}, {en: "Essential", ch: "(adj.) 必要的；精華的"}, {en: "Concept", ch: "(n.) 概念"}
        ];

        let currentPool = [], currentIndex = 0, correctCount = 0, wrongCount = 0;
        let wrongWords = [], currentQuestion = {}, pendingAction = null;

        function showScreen(name) {
            ['screen-start', 'screen-quiz', 'screen-result'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.add('hidden'); el.classList.remove('flex');
            });
            const target = document.getElementById(`screen-${name}`);
            target.classList.remove('hidden'); target.classList.add('flex');
            document.getElementById('game-info').classList.toggle('hidden', name !== 'quiz');
            document.getElementById('nav-restart').classList.toggle('hidden', name === 'start');
        }

        function initGame(mode = 'all') {
            currentPool = (mode === 'review') ? [...wrongWords] : [...WORDS];
            currentPool.sort(() => Math.random() - 0.5);
            currentIndex = 0; correctCount = 0; wrongCount = 0;
            if(mode === 'all') wrongWords = [];
            document.getElementById('progress-bar').style.width = '0%';
            updateStatsUI(); showScreen('quiz'); renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= currentPool.length) { showResult(); return; }
            const data = currentPool[currentIndex];
            const isEnToCh = Math.random() > 0.5;
            currentQuestion = { q: isEnToCh ? data.en : data.ch, a: isEnToCh ? data.ch : data.en, raw: data };
            document.getElementById('quiz-mode').innerText = isEnToCh ? "ENGLISH TO CHINESE" : "CHINESE TO ENGLISH";
            document.getElementById('quiz-question').innerText = currentQuestion.q;
            document.getElementById('btn-next').classList.add('invisible');

            let distractors = WORDS.filter(w => w.en !== data.en).sort(() => Math.random() - 0.5).slice(0, 3).map(w => isEnToCh ? w.ch : w.en);
            let correctPos = currentIndex % 4; // 絕對平均分配位置
            let options = []; let distractorIdx = 0;
            for (let i = 0; i < 4; i++) {
                if (i === correctPos) options.push(currentQuestion.a);
                else { options.push(distractors[distractorIdx]); distractorIdx++; }
            }

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-base opt-btn';
                btn.innerHTML = `<span class="opt-text">${opt}</span><span class="feedback-icon"></span>`;
                btn.onclick = () => {
                    const btns = grid.querySelectorAll('.opt-btn');
                    btns.forEach(b => b.disabled = true);
                    const icon = btn.querySelector('.feedback-icon');
                    if (opt === currentQuestion.a) {
                        btn.style.backgroundColor = '#E8F5E9'; btn.style.borderColor = '#81C784'; btn.style.color = '#2E7D32';
                        icon.innerText = '○'; icon.style.color = '#2E7D32';
                        correctCount++;
                    } else {
                        btn.style.backgroundColor = '#FFEBEE'; btn.style.borderColor = '#E57373'; btn.style.color = '#C62828';
                        icon.innerText = '×'; icon.style.color = '#C62828';
                        wrongCount++;
                        if (!wrongWords.some(w => w.en === currentQuestion.raw.en)) wrongWords.push(currentQuestion.raw);
                        btns.forEach(b => {
                            if(b.querySelector('.opt-text').innerText === currentQuestion.a) {
                                b.style.borderColor = '#81C784';
                                b.querySelector('.feedback-icon').innerText = '○';
                                b.querySelector('.feedback-icon').style.color = '#81C784';
                            }
                        });
                    }
                    updateStatsUI(true); document.getElementById('btn-next').classList.remove('invisible');
                };
                grid.appendChild(btn);
            });
        }

        function updateStatsUI(isAnswered = false) {
            document.getElementById('live-correct').innerText = correctCount;
            document.getElementById('live-wrong').innerText = wrongCount;
            document.getElementById('total-idx').innerText = currentPool.length;
            const displayIdx = isAnswered ? currentIndex + 1 : currentIndex;
            document.getElementById('current-idx').innerText = displayIdx;
            if (isAnswered) {
                const percent = ((currentIndex + 1) / currentPool.length) * 100;
                document.getElementById('progress-bar').style.width = `${percent}%`;
            }
        }

        function showResult() {
            showScreen('result');
            document.getElementById('result-score').innerText = `正確 ${correctCount} · 錯誤 ${wrongCount}`;
            const rb = document.getElementById('btn-review-wrong');
            if (wrongWords.length > 0) rb.classList.remove('hidden'); else rb.classList.add('hidden');
        }

        document.getElementById('nav-restart').onclick = () => {
            if (!document.getElementById('screen-quiz').classList.contains('hidden')) {
                document.getElementById('modal-title').innerText = "重新開始遊戲？";
                document.getElementById('modal-desc').innerText = "將回到封面，進度將被重置。";
                document.getElementById('confirm-modal').style.display = 'flex';
                pendingAction = () => showScreen('start');
            } else showScreen('start');
        };

        document.getElementById('nav-home').onclick = () => {
            if (!document.getElementById('screen-quiz').classList.contains('hidden')) {
                document.getElementById('modal-title').innerText = "回到主頁面？";
                document.getElementById('modal-desc').innerText = "將離開遊戲，回到 index 頁面。";
                document.getElementById('confirm-modal').style.display = 'flex';
                pendingAction = () => { window.location.href = 'index.html'; };
            } else window.location.href = 'index.html';
        };

        document.getElementById('modal-no').onclick = () => document.getElementById('confirm-modal').style.display = 'none';
        document.getElementById('modal-yes').onclick = () => { 
            document.getElementById('confirm-modal').style.display = 'none'; if(pendingAction) pendingAction(); 
        };

        document.getElementById('btn-play').onclick = () => initGame('all');
        document.getElementById('btn-play-again').onclick = () => initGame('all');
        document.getElementById('btn-review-wrong').onclick = () => initGame('review');
        document.getElementById('btn-next').onclick = () => { currentIndex++; updateStatsUI(false); renderQuestion(); };

        showScreen('start');
    </script>
</body>
</html>
